<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schis is Awesome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        #awesome-text {
            position: relative; z-index: 10;
            color: #fff; font-size: 5rem;
            text-align: center; animation-duration: 3s; 
            text-shadow: 0 0 15px #5BCEFA, 0 0 25px #F5A9B8;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
        }

        .sub-text {
            display: block; font-size: 2.5rem;
            margin-top: 15px; color: #F5A9B8;
        }

        .cat-conveyor {
            position: fixed; bottom: 0; left: 0;
            width: 100%; height: 200px;
            z-index: 5; pointer-events: none;
        }

        .cat {
            position: absolute;
            bottom: 0;
            width: 200px; /* The 2x scale width */
            left: -200px; /* Start exactly one cat-width off-screen */
            animation: march linear infinite;
        }

        @keyframes march {
            0% { left: -200px; }
            100% { left: 100vw; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="cat-conveyor" id="conveyor"></div>

    <h1 id="awesome-text" class="animate__animated animate__jackInTheBox">
        Schis is fuckin' awesome
        <span class="sub-text">(and heccin' cute)</span>
    </h1>

    <audio id="guitar-solo" src="https://www.myinstants.com/media/sounds/epic-guitar-solo.mp3" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const conveyor = document.getElementById('conveyor');
        const catWidth = 200; // Matches CSS width
        const screenWidth = window.innerWidth;
        const pixelsPerSecond = 180; // Adjusted for a smooth, steady march
        
        // Total distance a cat travels: (Screen Width + the cat's own width)
        const travelDistance = screenWidth + catWidth;
        const duration = travelDistance / pixelsPerSecond;
        
        // How many cats do we need to have zero gaps?
        // We need one cat every [catWidth] pixels.
        const totalCats = Math.ceil(travelDistance / catWidth);

        for (let i = 0; i < totalCats; i++) {
            const img = document.createElement('img');
            img.src = 'cat-dance-fixed.gif';
            img.className = 'cat';
            
            img.style.animationDuration = `${duration}s`;
            
            // The magic math: stagger each cat by the time it takes to move one cat-width
            const delayPerCat = catWidth / pixelsPerSecond;
            img.style.animationDelay = `${delayPerCat * i}s`;
            
            conveyor.appendChild(img);
        }

        const canvas = document.getElementById('confetti-canvas');
        const myConfetti = confetti.create(canvas, { resize: true });
        const transColors = ['#5BCEFA', '#F5A9B8', '#FFFFFF'];
        let isBlasting = false;

        function fireContinuous() {
            setInterval(() => {
                const config = {
                    particleCount: 25, spread: 60,
                    startVelocity: 110, gravity: 0.9,
                    decay: 0.92, colors: transColors, scalar: 1.2
                };
                myConfetti({ ...config, angle: 65, origin: { x: 0, y: 1 } });
                myConfetti({ ...config, angle: 115, origin: { x: 1, y: 1 } });
            }, 60); 
        }

        window.addEventListener('click', () => {
            document.getElementById('guitar-solo').play();
            if (!isBlasting) {
                fireContinuous();
                isBlasting = true;
            }
        });

        window.onload = fireContinuous;
    </script>
</body>
</html>
