<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schis is Fit! :3</title>
    <style>
        :root {
            --trans-blue: #5BCEFA;
            --trans-pink: #F5A9B8;
            --trans-white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--trans-blue) 0%, var(--trans-pink) 50%, var(--trans-blue) 100%);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* The Flag Wave Effect */
        .flag-container {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 350px;
            height: 220px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: wave 3s ease-in-out infinite;
            transform-origin: center;
        }

        .stripe { height: 20%; width: 100%; }
        .blue { background-color: var(--trans-blue); }
        .pink { background-color: var(--trans-pink); }
        .white { background-color: var(--trans-white); }

        .text-box {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px 40px;
            border-radius: 50px;
            border: 4px solid var(--trans-pink);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        h1 {
            color: #555;
            margin: 0;
            font-size: 1.8rem;
        }

        .sparkles {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0) rotate(-2deg) skewX(2deg); }
            50% { transform: translateY(-15px) rotate(2deg) skewX(-2deg); }
        }

        .text-box:hover {
            transform: scale(1.1);
        }

        /* Floaties for extra aesthetic */
        .floatie {
            position: absolute;
            color: white;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: float Up 5s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="flag-container">
        <div class="stripe blue"></div>
        <div class="stripe pink"></div>
        <div class="stripe white"></div>
        <div class="stripe pink"></div>
        <div class="stripe blue"></div>
    </div>

    <div class="text-box">
        <span class="sparkles">✨🏳️‍⚧️✨</span>
        <h1>Hey you, you're pretty fit! :3</h1>
    </div>

    <script>
        // Let's add some floating hearts because why not
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floatie';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.innerText = '💖';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 800);
    </script>

</body>
</html>
